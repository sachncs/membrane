services:
  redis:
    image: redis:7-alpine
    container_name: membrane-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - membrane-net

  membrane:
    build:
      context: .
      dockerfile: Dockerfile
    image: membrane:latest
    container_name: membrane-server
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "50051:50051"
    environment:
      - MEMBRANE_LOG_LEVEL=INFO
      - MEMBRANE_REDIS_URL=redis://redis:6379/0
      - MEMBRANE_NODE_ID=membrane-0
      - MEMBRANE_TRANSPORT=http
      - MEMBRANE_COMPUTE=cpu
      - MEMBRANE_PORT=8080
    command: >
      membrane serve
      --node-id ${MEMBRANE_NODE_ID:-membrane-0}
      --host 0.0.0.0
      --port ${MEMBRANE_PORT:-8080}
      --transport ${MEMBRANE_TRANSPORT:-http}
      --compute ${MEMBRANE_COMPUTE:-cpu}
      --redis ${MEMBRANE_REDIS_URL:-redis://redis:6379/0}
      --daemon
    volumes:
      - ./membrane:/app/membrane:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - membrane-net

  nginx:
    image: nginx:alpine
    container_name: membrane-nginx
    depends_on:
      - membrane
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - membrane-net

  membrane-tests:
    build:
      context: .
      dockerfile: Dockerfile
    image: membrane:latest
    container_name: membrane-tests
    depends_on:
      - redis
    command: ["pytest", "tests/", "-q", "--tb=short"]
    profiles:
      - test
    environment:
      - MEMBRANE_LOG_LEVEL=WARNING
    networks:
      - membrane-net

volumes:
  redis-data:

networks:
  membrane-net:
    driver: bridge
